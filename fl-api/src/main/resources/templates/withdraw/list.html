<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="-GtbyxFZmoYOuwm4Ln6c4m7QCefW7SjCsci-K9lZHIU" />
    <title>출금 신청 내역</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #343a40;
        }

        .withdraw-table {
            width: 100%;
            border-collapse: collapse;
        }

        .withdraw-table thead {
            background-color: #007bff;
            color: white;
        }

        .withdraw-table th, .withdraw-table td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }

        .withdraw-table tr:nth-child(even) {
            background-color: #f1f3f5;
        }

        form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            padding: 6px 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            width: 120px;
        }

        button {
            padding: 6px 14px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>출금 신청 내역</h1>

    <table class="withdraw-table">
        <thead>
        <tr>
            <th>예금주</th>
            <th>페이팔 입금 정보</th>
            <th>출금 금액</th>
            <th>출금 유형</th>
            <th>출금 신청 일시</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="withdraw : ${withdraws}">
            <td th:text="${withdraw.depositorName}"></td>
            <td th:text="${withdraw.paypalInformation}"></td>
            <td th:text="${withdraw.chargeAmount}"></td>
            <td th:text="${withdraw.chargeType}"></td>
            <td th:text="${withdraw.historyDateTime}"></td>
            <td>
                <form th:action="@{/admin/complete}" method="post">
                    <input type="hidden" name="userAccountId" th:value="${withdraw.userAccountId}">
                    <input type="hidden" name="pointHistoryId" th:value="${withdraw.pointHistoryId}">
                    <input type="text" name="token" placeholder="토큰 입력" required>
                    <button type="submit">환전 완료</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
