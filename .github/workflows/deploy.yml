name: Deploy to EC2

on:
  push:
    branches:
      - fl-master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build JARs (without tests)
        run: |
          ./gradlew :fl-api:assemble -Dspring.profiles.active=test
          ./gradlew :fl-chatting:assemble -Dspring.profiles.active=test

      # Docker 이미지 빌드
      - name: Build Docker images
        run: |
          docker build -t minseok2000/cozy-api ./fl-api
          docker build -t minseok2000/cozy-chatting ./fl-chatting

      - name: Save Docker images to tar
        run: |
          docker save minseok2000/cozy-api -o cozy-api.tar
          docker save minseok2000/cozy-chatting -o cozy-chatting.tar
      - name: Fix permissions of tar files
        run: |
          chmod 644 cozy-api.tar
          chmod 644 cozy-chatting.tar
      # 디버깅: 파일 목록 확인
      - name: List files in the working directory
        run: ls -alh

      # .env 파일 생성
      - name: Create .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # EC2에 .env 파일 업로드
      - name: Upload .env to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: .env
          target: /home/ubuntu/
      # firebase-key.json 복호화용 Step
      # firebase-key.json 복호화 및 권한 설정
      - name: SSH to EC2 and decode Firebase key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu

            # .env에서 FIREBASE_KEY_BASE64 읽어서 복호화
            export $(grep FIREBASE_KEY_BASE64 .env | xargs)
            echo "$FIREBASE_KEY_BASE64" | base64 -d > ./firebase-key.json

            # firebase-key.json 파일 권한 설정 (읽기 권한 부여)
            sudo chmod 644 /home/ubuntu/firebase-key.json

            echo "[✔] firebase-key.json 복호화 및 생성 완료"
      # EC2에 docker-compose.yml 업로드
      - name: Upload docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: ./docker-compose.yml
          target: /home/ubuntu/

      # EC2에 Docker 이미지 tar 파일들 업로드 (개별 파일 업로드)
      - name: Upload Docker image tars to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "cozy-api.tar"
          target: /home/ubuntu/

      - name: Upload Docker image tars to EC2 (cozy-chatting)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "cozy-chatting.tar"
          target: /home/ubuntu/

      # EC2에 SSH 접속 후 배포
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu

            # 기존 컨테이너 정지
            sudo docker-compose down || true
            sudo docker stop $(sudo docker ps -q) || true

            # 기존 Redis 서비스 정지 (OS-level Redis가 있다면)
            sudo systemctl stop redis || true

            # tar 파일로부터 이미지 로드
            sudo docker load -i cozy-api.tar
            sudo docker load -i cozy-chatting.tar

            # docker-compose 재시작
            sudo docker-compose up -d