map:
  api-url: https://maps.googleapis.com/maps/api/geocode/json
  api-key: ${FL_MAP_API_KEY}

aws:
  access:
    key:
      id: ${AWS_ACCESS_KEY_ID}
  secret:
    access:
      key: ${AWS_SECRET_KEY}
  region : ap-southeast-2
  s3:
    bucket:
      name: cozyshare-s3-bucket

server:
  port: 8082

admin:
  token: ${ADMIN_TOKEN}

apple:
  key-url: https://appleid.apple.com/auth/keys

oauth:
  android-client-id: ${ANDROID_OAUTH_CLIENT_KEY}
  ios-client-id: ${IOS_OAUTH_CLIENT_KEY}

paypal:
  client-id: ${PAYPAL_CLIENT_ID}
  client-secret: ${PAYPAL_CLIENT_SECRET}
  paypal-api-url: ${PAYPAL_API_URL}
  paypal-access-token-url: ${PAYPAL_ACCESS_TOKEN_URL}
  mode: ${PAYPAL_MODE}

jwt:
  secretKey: ${JWT_KEY}
  access:
    expiration: 3600000
    header: Authorization
  refresh:
    expiration: 1209600000
    header: Authorization-refresh

thread:
  pool:
    core-pool-size: 4
    queue-capacity: 50
    max-pool-size: 8


domain:
#  base: ${FL_CHAT_DOMAIN_BASE_URL}
  chat:
    directMessage: /dm
    publish: /pub
    subscribe: /sub

firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  key-url: ${FIREBASE_KEY_URL}
  key-name: ${FIREBASE_KEY_NAME}
