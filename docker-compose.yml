version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  fl-api:
    image: minseok2000/cozy-api
    container_name: fl-api
    expose:
      - "8080"
    ports:
      - "8080:8080"
    env_file:
      - /home/ubuntu/.env
    volumes:
      - /home/ubuntu/firebase-key.json:/app/firebase-key.json
    environment:
      - TZ=Australia/Sydney
    networks:
      - app-network
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-southeast-2
        awslogs-group: cozysharelogs
        awslogs-stream: fl-api
        awslogs-create-group: "true"

  fl-chatting:
    image: minseok2000/cozy-chatting
    container_name: fl-chatting
    expose:
      - "8082"
    ports:
      - "8082:8082"
    env_file:
      - /home/ubuntu/.env
    environment:
      - TZ=Australia/Sydney
    networks:
      - app-network
    volumes:
      - /home/ubuntu/firebase-key.json:/app/firebase-key.json
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-southeast-2
        awslogs-group: cozysharelogs
        awslogs-stream: fl-chatting
        awslogs-create-group: "true"

  fl-batch:
    image: minseok2000/cozy-batch
    container_name: fl-batch
    expose:
      - "8084"
    ports:
      - "8084:8084"
    env_file:
      - /home/ubuntu/.env
    environment:
      - TZ=Australia/Sydney
    networks:
      - app-network
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-southeast-2
        awslogs-group: cozysharelogs
        awslogs-stream: fl-batch
        awslogs-create-group: "true"
